<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的镜像加速</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #1f2937; }
  header { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: #fff; padding: 28px 24px; }
  header .wrap { max-width: 900px; margin: 0 auto; }
  header h1 { margin: 0 0 6px; font-size: 18px; font-weight: 500; opacity: .9; }
  header .mirror { font-family: monospace; font-size: 16px; background: rgba(255,255,255,.15); padding: 8px 12px; border-radius: 4px; display: inline-flex; align-items: center; gap: 12px; }
  header .mirror button { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  main { max-width: 900px; margin: -20px auto 0; padding: 0 24px 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card .label { font-size: 12px; color: #6b7280; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 6px; }
  .card .sub { font-size: 12px; color: #9ca3af; margin-top: 6px; }
  .progress { margin-top: 8px; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
  .progress > div { height: 100%; background: #2563eb; }
  .progress.warn > div { background: #f59e0b; }
  .progress.danger > div { background: #ef4444; }
  .status-active { color: #059669; }
  .status-revoked, .status-expired { color: #dc2626; }
  .usage-list { margin-top: 16px; }
  .usage-list .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
  .help { background: #fff; border-radius: 8px; padding: 20px; margin-top: 16px; }
  .help h2 { margin: 0 0 12px; font-size: 14px; }
  pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; }

  /* chat 悬浮气泡 */
  .chat-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: #2563eb; color: #fff; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,.4); font-size: 24px; z-index: 100; }
  .chat-fab .badge { position: absolute; top: 0; right: 0; min-width: 18px; height: 18px; line-height: 18px; padding: 0 4px; background: #ef4444; color: #fff; border-radius: 9px; font-size: 11px; }
  .chat-panel { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 480px; background: #fff; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,.2); display: none; flex-direction: column; z-index: 100; overflow: hidden; }
  .chat-panel.open { display: flex; }
  .chat-head { background: #2563eb; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
  .chat-head .title { flex: 1; font-size: 14px; }
  .chat-head .online { width: 8px; height: 8px; border-radius: 4px; background: #10b981; }
  .chat-head .online.off { background: #9ca3af; }
  .chat-head button { background: transparent; color: #fff; border: none; cursor: pointer; font-size: 20px; line-height: 1; }
  .chat-body { flex: 1; overflow-y: auto; padding: 12px; background: #f9fafb; }
  .msg { margin-bottom: 10px; max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
  .msg.from-user { background: #2563eb; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .msg.from-admin { background: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
  .msg .ts { font-size: 10px; opacity: .6; margin-top: 4px; }
  .chat-foot { display: flex; padding: 8px; gap: 6px; border-top: 1px solid #e5e7eb; background: #fff; }
  .chat-foot input { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .chat-foot button { padding: 8px 14px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .chat-foot button:disabled { background: #9ca3af; }
</style>
</head>
<body>

<header><div class="wrap">
  <h1 id="hi">加载中…</h1>
  <div class="mirror">
    <span id="mirror-url">—</span>
    <button onclick="copyMirror()">复制</button>
  </div>
</div></header>

<main>
  <div class="grid">
    <div class="card">
      <div class="label">剩余流量</div>
      <div class="value" id="balance">—</div>
      <div class="progress"><div id="balance-bar" style="width:100%"></div></div>
      <div class="sub" id="balance-sub"></div>
    </div>
    <div class="card">
      <div class="label">到期时间</div>
      <div class="value" id="expires">—</div>
      <div class="sub" id="expires-sub"></div>
    </div>
    <div class="card">
      <div class="label">状态</div>
      <div class="value" id="status">—</div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div class="label">最近 7 天用量</div>
    <div class="usage-list" id="usage-list"></div>
  </div>

  <div class="help">
    <h2>使用方法 / Docker daemon.json</h2>
    <pre id="cfg"></pre>
    <p style="font-size:12px;color:#6b7280;margin:8px 0 0">配置后执行 <code>systemctl restart docker</code>(NAS 群晖在容器管理 → 注册表设置加镜像源)。</p>
  </div>
</main>

<!-- chat -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()">
  💬<span class="badge" id="chat-badge" style="display:none">0</span>
</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-head">
    <span class="online off" id="chat-online"></span>
    <span class="title" id="chat-title">客服</span>
    <button onclick="toggleChat()">×</button>
  </div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-foot">
    <input id="chat-input" placeholder="输入消息…" maxlength="2000">
    <button id="chat-send" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
let me = null;
let ws = null;

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  let data = null;
  try { data = await r.json(); } catch (_) {}
  if (!r.ok) throw new Error((data && data.error) || r.statusText);
  return data;
}

function fmtBytes(n) {
  n = +n || 0;
  const u = ['B','KB','MB','GB','TB']; let i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(i === 0 ? 0 : 2) + ' ' + u[i];
}
function fmtDay(d) {
  return d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
}
function fmtTime(ms) {
  const dt = new Date(ms);
  return dt.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
}

async function init() {
  try {
    me = await api('GET', '/api/me');
  } catch (err) {
    document.body.innerHTML = `<div style="padding:40px;text-align:center"><h2>无法访问</h2><p>${err.message}</p></div>`;
    return;
  }
  document.getElementById('hi').textContent = `欢迎,${me.user_id}`;
  document.getElementById('mirror-url').textContent = me.mirror_url;
  document.getElementById('cfg').textContent =
    `{\n  "registry-mirrors": ["${me.mirror_url}"]\n}`;

  // balance
  const totalGuess = +me.balance + Object.values(me.usage_7d || {}).reduce((a,b) => a+(+b||0), 0);
  const pct = totalGuess > 0 ? (me.balance / totalGuess) * 100 : 100;
  document.getElementById('balance').textContent = fmtBytes(me.balance);
  const bar = document.getElementById('balance-bar');
  bar.style.width = pct + '%';
  bar.parentElement.classList.toggle('warn', pct < 30);
  bar.parentElement.classList.toggle('danger', pct < 10);
  document.getElementById('balance-sub').textContent = pct < 30 ? '余额不足,请尽快续费' : '';

  // expires
  if (+me.expires_at) {
    const d = new Date(+me.expires_at * 1000);
    const days = Math.floor((d - Date.now()) / 86400000);
    document.getElementById('expires').textContent = d.toLocaleDateString('zh-CN');
    document.getElementById('expires-sub').textContent = days >= 0 ? `还剩 ${days} 天` : '已过期';
  } else {
    document.getElementById('expires').textContent = '永久';
  }

  // status
  const stEl = document.getElementById('status');
  stEl.textContent = me.status;
  stEl.className = 'value ' + (me.status === 'active' ? 'status-active' : 'status-revoked');

  // usage
  const u = me.usage_7d || {};
  const days = Object.keys(u).sort().reverse();
  document.getElementById('usage-list').innerHTML = days.map(d =>
    `<div class="row"><span>${fmtDay(d)}</span><span>${fmtBytes(u[d])}</span></div>`
  ).join('') || '<div class="row" style="color:#9ca3af">暂无</div>';

  // chat
  setOnline(!!me.admin_online);
  if (me.unread > 0) showBadge(me.unread);
  loadChatHistory();
  connectWS();
}

function copyMirror() {
  navigator.clipboard.writeText(me.mirror_url).then(() => alert('已复制'));
}

// ---------- chat ----------
function setOnline(on) {
  const el = document.getElementById('chat-online');
  el.classList.toggle('off', !on);
  document.getElementById('chat-title').textContent = on ? '客服(在线)' : '客服(离线,留言后会回复)';
}
function showBadge(n) {
  const b = document.getElementById('chat-badge');
  if (n > 0) { b.style.display = ''; b.textContent = n > 99 ? '99+' : n; }
  else b.style.display = 'none';
}
function toggleChat() {
  const p = document.getElementById('chat-panel');
  const open = p.classList.toggle('open');
  document.getElementById('chat-fab').style.display = open ? 'none' : '';
  if (open) {
    showBadge(0);
    document.getElementById('chat-input').focus();
    fetch('/api/chat/messages').catch(() => {}); // 标记已读
  }
}
async function loadChatHistory() {
  try {
    const list = await api('GET', '/api/chat/messages');
    const body = document.getElementById('chat-body');
    body.innerHTML = list.map(renderMsg).join('');
    body.scrollTop = body.scrollHeight;
  } catch (_) {}
}
function renderMsg(m) {
  const isUser = m.from === 'user';
  return `<div class="msg from-${isUser ? 'user' : 'admin'}">
    ${escapeHTML(m.text)}
    <div class="ts">${fmtTime(m.ts)}${isUser ? '' : ' · ' + escapeHTML(m.from.replace('admin:',''))}</div>
  </div>`;
}
function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/chat/ws');
  ws.onmessage = (ev) => {
    let m;
    try { m = JSON.parse(ev.data); } catch (_) { return; }
    const body = document.getElementById('chat-body');
    body.insertAdjacentHTML('beforeend', renderMsg(m));
    body.scrollTop = body.scrollHeight;
    // 如果 panel 没打开,角标 +1
    if (!document.getElementById('chat-panel').classList.contains('open') && m.from !== 'user') {
      const cur = +(document.getElementById('chat-badge').textContent) || 0;
      showBadge(cur + 1);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000); // 自动重连
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ text }));
  // 乐观渲染:本地先显示
  const body = document.getElementById('chat-body');
  body.insertAdjacentHTML('beforeend', renderMsg({ from: 'user', text, ts: Date.now() }));
  body.scrollTop = body.scrollHeight;
  input.value = '';
}
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMsg();
});

init();
</script>
</body>
</html>
